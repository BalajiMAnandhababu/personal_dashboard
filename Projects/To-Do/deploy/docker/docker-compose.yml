services:
  dashboard-server:
    image: node:20-alpine
    restart: always
    working_dir: /app
    command: sh -c "npm install --production && node index.js"
    volumes:
      - /var/www/personal_dashboard/Projects/To-Do/server:/app
      - dashboard_node_modules:/app/node_modules
    env_file:
      - /var/www/personal_dashboard/Projects/To-Do/server/.env
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - n8n_default

  dashboard-frontend:
    image: nginx:alpine
    restart: always
    volumes:
      - /var/www/personal_dashboard/Projects/To-Do/client/dist:/usr/share/nginx/html:ro
      - /docker/command-dashboard/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`pdb.infinexcorp.io`)
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.entrypoints=web,websecure
      - traefik.http.routers.dashboard.tls.certresolver=mytlschallenge
      - traefik.http.services.dashboard.loadbalancer.server.port=80
    networks:
      - n8n_default

volumes:
  dashboard_node_modules:

networks:
  n8n_default:
    external: true
